<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beisltour Quiz</title>
    <style>
        :root { 
            --primary: #d4af37; /* Gold-Ton für Beisl-Feeling */
            --dark: #1a1a1a; 
            --success: #28a745; 
            --bg: #2c3e50; 
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: white;
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            min-height: 100vh;
        }

        h1 { 
            font-size: 1.8rem; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
            margin-bottom: 10px; 
            text-align: center;
        }

        /* Route Sektion */
        .route-container {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
            box-sizing: border-box;
        }

        .route-link {
            background: #4285F4;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-top: 10px;
        }

        .route-link:hover {
            transform: scale(1.05);
            background: #357ae8;
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            width: 100%; 
            max-width: 450px; 
        }
        
        .section-title { 
            font-weight: bold; 
            color: var(--primary); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        /* Rezensionen Karten */
        #reviews-pool {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 6px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .item img { 
            width: 100%; 
            border-radius: 8px; 
            display: block; 
        }

        .item.selected { 
            outline: 4px solid var(--primary);
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }

        .item.hidden { 
            display: none; 
        }

        /* Lokale Gitter */
        #locations-list { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }

        .target-box { 
            background: rgba(255,255,255,0.05); 
            border: 2px dashed rgba(255,255,255,0.2); 
            border-radius: 12px; 
            padding: 15px; 
            text-align: center; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            transition: 0.3s;
            cursor: pointer;
        }

        .target-box.solved { 
            background: var(--success); 
            border-style: solid;
            border-color: #fff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .target-box p { 
            margin: 0; 
            font-weight: bold; 
            color: white; 
            font-size: 0.9rem;
        }
        
        .status-msg { 
            margin-bottom: 10px; 
            font-style: italic; 
            opacity: 0.8; 
            font-size: 0.9rem;
            text-align: center;
        }

        footer {
            margin-top: 40px;
            font-size: 0.7rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <h1>🍻 Beisltour Quiz</h1>
    
    <div class="route-container">
    <div style="font-size: 0.8rem; margin-bottom: 8px;">UNSERE ROUTE</div>
    <iframe src="https://www.google.com/maps/d/embed?mid=1VHevG4YNYTYieJYU7nA-8zQgJJyvw-Y&ehbc=2E312F" width="100%" height="300" style="border:0; border-radius:12px;"></iframe>
    <br>
    <a href="https://www.google.com/maps/d/embed?mid=1VHevG4YNYTYieJYU7nA-8zQgJJyvw-Y&ehbc=2E312F" class="route-link" target="_blank">📍 In Maps App öffnen</a>
</div>
    
    <p class="status-msg">1. Rezension wählen &nbsp;➔&nbsp; 2. Lokal wählen</p>

    <div class="container">
        <span class="section-title">Zu welchem Lokal gehört die Rezension?</span>
        <div id="reviews-pool">
            <div class="item" id="res_tutti" onclick="selectReview('res_tutti')"><img src="rez1.png" alt="Rezension"></div>
            <div class="item" id="res_susi" onclick="selectReview('res_susi')"><img src="SusiUndStrolch.png" alt="Rezension"></div>
            <div class="item" id="res_gugis" onclick="selectReview('res_gugis')"><img src="rez3.png" alt="Rezension"></div>
            <div class="item" id="res_matz" onclick="selectReview('res_matz')"><img src="rez4.png" alt="Rezension"></div>
            <div class="item" id="res_espresso" onclick="selectReview('res_espresso')"><img src="rez5.png" alt="Rezension"></div>
            <div class="item" id="res_mitzis" onclick="selectReview('res_mitzis')"><img src="rez6.png" alt="Rezension"></div>
            <div class="item" id="res_mendo" onclick="selectReview('res_mendo')"><img src="rez7.png" alt="Rezension"></div>
        </div>

        <span class="section-title">Die Lokale</span>
        <div id="locations-list">
            <div class="target-box" id="goal_tutti" onclick="matchLocation('tutti')"><p>Cafe Tutti Frutti</p></div>
            <div class="target-box" id="goal_susi" onclick="matchLocation('susi')"><p>Susi und Strolch</p></div>
            <div class="target-box" id="goal_gugis" onclick="matchLocation('gugis')"><p>Gugis Beisl</p></div>
            <div class="target-box" id="goal_matz" onclick="matchLocation('matz')"><p>Cafe Matz</p></div>
            <div class="target-box" id="goal_espresso" onclick="matchLocation('espresso')"><p>Café Espresso</p></div>
            <div class="target-box" id="goal_mitzis" onclick="matchLocation('mitzis')"><p>Mitzis Treff</p></div>
            <div class="target-box" id="goal_mendo" onclick="matchLocation('mendo')"><p>Mendocino</p></div>
        </div>
    </div>

    <footer>Erstellt für die legendäre Beisltour 2026</footer>

    <script>
        let selectedReviewId = null;

        // Rezensionen beim Laden mischen (Shuffle)
        window.addEventListener('DOMContentLoaded', () => {
            const pool = document.getElementById('reviews-pool');
            for (let i = pool.children.length; i >= 0; i--) {
                pool.appendChild(pool.children[Math.random() * i | 0]);
            }
        });

        function selectReview(id) {
            // Falls schon eins gewählt war, Markierung entfernen
            if (selectedReviewId) {
                const old = document.getElementById(selectedReviewId);
                if(old) old.classList.remove('selected');
            }
            // Neues wählen
            selectedReviewId = id;
            document.getElementById(id).classList.add('selected');
        }

        function matchLocation(locId) {
            if (!selectedReviewId) {
                alert("Wähle zuerst oben eine Rezension aus!");
                return;
            }
            
            const reviewKey = selectedReviewId.replace('res_', '');
            
            if (reviewKey === locId) {
                // Richtig!
                const reviewEl = document.getElementById(selectedReviewId);
                reviewEl.classList.add('hidden');
                
                const targetEl = document.getElementById('goal_' + locId);
                targetEl.classList.add('solved');
                targetEl.innerHTML = "<p>✅ " + targetEl.innerText.replace('✅ ', '') + "</p>";
                
                selectedReviewId = null;
                checkWin();
            } else {
                // Falsch
                alert("Oje! Das passt nicht zusammen. Probier ein anderes Lokal.");
                // Auswahl zur Sicherheit aufheben
                document.getElementById(selectedReviewId).classList.remove('selected');
                selectedReviewId = null;
            }
        }

        function checkWin() {
            const solved = document.querySelectorAll('.target-box.solved').length;
            if (solved === 7) {
                setTimeout(() => {
                    alert("PROST! 🍻\nDu hast alle Rezensionen richtig zugeordnet!\nJetzt seid ihr bereit für die Tour.");
                }, 500);
            }
        }
    </script>
</body>
</html>
